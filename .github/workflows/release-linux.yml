name: Release Linux Binary

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify Go tests
        run: go test ./...

      - name: Build Linux server binary
        run: make build-linux

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" \
            dist/server-linux-amd64 \
            dist/server-linux-amd64.sha256 \
            --title "$RELEASE_TAG" \
            --notes "Linux amd64 server binary for VPS live mempool benchmark."
