<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Runs</title><style>body{font-family:"IBM Plex Sans","Segoe UI",sans-serif;padding:20px} table{width:100%;border-collapse:collapse} th,td{padding:8px;border-bottom:1px solid #ddd} a{color:#0f766e}</style></head>
<body>
<h2>Benchmark Runs</h2>
<p><a href="/">Back</a></p>
<table>
<tr><th>ID</th><th>Created</th><th>Mode</th><th>Method</th><th>Status</th><th>Notes</th></tr>
{{range .Runs}}<tr><td>{{.ID}}</td><td>{{.CreatedAt.UTC.Format "2006-01-02 15:04:05"}}</td><td>{{.Mode}}</td><td>{{.Method}}</td><td>{{.Status}}</td><td>{{.Notes}}</td></tr>{{else}}<tr><td colspan="6">No runs logged yet.</td></tr>{{end}}
</table>
</body></html>
