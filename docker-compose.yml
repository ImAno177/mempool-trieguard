services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mempool-trieguard:latest
    container_name: mempool-trieguard-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      APP_MODE: "vps-live"
      APP_LISTEN_ADDR: ":8080"
      APP_DB_PATH: "/app/data/app.db"
      APP_DATA_DIR: "/app/data"
      APP_BASIC_AUTH_USER: "${APP_BASIC_AUTH_USER:-admin}"
      APP_BASIC_AUTH_PASS: "${APP_BASIC_AUTH_PASS:-change-me}"
      DRPC_HTTP_URL: "${DRPC_HTTP_URL}"
      DRPC_WSS_URL: "${DRPC_WSS_URL}"
      DRPC_KEY: "${DRPC_KEY}"
    volumes:
      - ./configs:/app/configs
      - ./data:/app/data
      - ./results:/app/results

  benchmark:
    image: mempool-trieguard:latest
    container_name: mempool-trieguard-benchmark
    profiles: ["benchmark"]
    environment:
      DRPC_HTTP_URL: "${DRPC_HTTP_URL}"
      DRPC_WSS_URL: "${DRPC_WSS_URL}"
      DRPC_KEY: "${DRPC_KEY}"
    command:
      - python
      - python/benchmark_pipeline.py
      - --dataset-root
      - /dataset
      - --config
      - /app/configs/app.yaml
      - --results-dir
      - /app/results
      - --run-mode
      - smoke
      - --detector-cli
      - detector-cli
    volumes:
      - ./29212703:/dataset:ro
      - ./configs:/app/configs
      - ./data:/app/data
      - ./results:/app/results
